{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="collection-section">
  <h1 class="text-center mb-5">✨ New Collection ✨</h1>

  <div class="row">

    {% for item in items %}
    <div class="col-md-4 mb-4">
      <div class="card shadow-lg p-3 text-center">

        <!-- Image -->
        <img src="{% static 'img/'|add:item.image %}" class="img-fluid" height="250">

        <!-- Name + NEW badge -->
        <h4 class="mt-3">
          {{ item.name }}
          {% if item.new %}
            <span class="badge bg-danger">NEW</span>
          {% endif %}
        </h4>

        <!-- Price -->
        <!-- <h3 style="color:green;">₹{{ item.price }}</h3> -->

        <!-- Button -->
        <button class="btn btn-dark mt-2">Buy Now</button>

      </div>
    </div>
    {% endfor %}

  </div>
</div>

{% endblock %}
